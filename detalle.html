<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle | Consultora Tres Valles</title>
  <link rel="stylesheet" href="detalle.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <header class="detail-header">
    <a href="index.html" class="back-link">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
      <span>Volver al inicio</span>
    </a>
  </header>

  <main>
    <section class="detail-top">
      <div class="category-switcher">
      <button class="switch-btn" data-type="cursos">Cursos</button>
      <button class="switch-btn" data-type="asesorias">Asesorías</button>
      <button class="switch-btn" data-type="capacitaciones">Capacitaciones</button>
</div>
    </section>

    <section class="carousel-section">
      <div class="carousel-shell">
        <button class="carousel-arrow" id="prevBtn" type="button" aria-label="Anterior">
          <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
        </button>
        <div class="carousel-stage">
          <div class="carousel-glow"></div>
          <div class="carousel-ring"></div>
          <div class="carousel-floor"></div>
          <div class="carousel-viewport">
            <div class="carousel-track" id="carouselTrack"></div>
          </div>
        </div>
        <button class="carousel-arrow" id="nextBtn" type="button" aria-label="Siguiente">
          <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
        </button>
      </div>
      <div class="carousel-indicators" id="carouselIndicators"></div>
    </section>

    <section class="info-section">
      <div class="info-box" id="infoBox">
        <div class="info-header">
          <p class="info-mini-tag" id="infoMiniTag">&nbsp;</p>
          <h2 id="infoTitle">&nbsp;</h2>
          <p class="info-description" id="infoDescription">&nbsp;</p>
        </div>
        <div class="info-meta">
          <div class="meta-card">
            <i class="fa-regular fa-clock" aria-hidden="true"></i>
            <h3>Duración</h3>
            <p id="infoDuration">-</p>
          </div>
          <div class="meta-card">
            <i class="fa-solid fa-laptop" aria-hidden="true"></i>
            <h3>Modalidad</h3>
            <p id="infoMode">-</p>
          </div>
          <div class="meta-card">
            <i class="fa-solid fa-signal" aria-hidden="true"></i>
            <h3>Nivel</h3>
            <p id="infoLevel">-</p>
          </div>
        </div>
        <div class="info-benefits">
          <h3>¿Qué obtendrás?</h3>
          <ul id="infoBenefits"></ul>
        </div>
        <div class="info-actions">
          <a id="infoButton" href="#" target="_blank" rel="noopener noreferrer" class="primary-btn">
            Consultar ahora
          </a>
        </div>
      </div>
    </section>
  </main>
  <script src="detalle.js"></script>
</body>
</html>
